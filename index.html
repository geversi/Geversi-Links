<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEVERSI | המרכז הרשמי</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000; color: white;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; overflow-x: hidden;
        }

        #bg-video {
            position: fixed; right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -2; object-fit: cover;
            filter: brightness(0.4) contrast(1.2);
        }

        .cursor-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(0, 150, 255, 0.2) 0%, transparent 20%);
            pointer-events: none; z-index: -1;
        }

        .container {
            width: 90%; max-width: 400px; text-align: center;
            background: rgba(0, 0, 0, 0.75);
            padding: 40px 25px; border-radius: 30px;
            border: 1px solid rgba(0, 191, 255, 0.4);
            box-shadow: 0 0 40px rgba(0, 0, 0, 1);
            backdrop-filter: blur(15px); z-index: 2;
        }

        .profile-img {
            width: 120px; height: 120px; border-radius: 50%;
            border: 4px solid #00bfff; margin-bottom: 15px;
            box-shadow: 0 0 25px #00bfff; transition: 0.5s;
            object-fit: cover;
        }

        .profile-img:hover { transform: rotate(5deg) scale(1.1); }

        h1 {
            font-size: 38px; margin: 0;
            text-transform: uppercase; letter-spacing: 5px;
            font-weight: 900; text-shadow: 2px 2px 10px #00bfff;
        }

        .subtitle {
            color: #00bfff; font-size: 14px;
            margin-bottom: 30px; letter-spacing: 2px;
        }

        .link-btn {
            display: flex; align-items: center; justify-content: center;
            gap: 12px; padding: 18px; margin: 15px 0;
            color: white; text-decoration: none;
            border-radius: 15px; font-weight: bold; font-size: 18px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .link-btn:hover {
            transform: scale(0.96);
            background: rgba(0, 191, 255, 0.2);
            border-color: #00bfff;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 0, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 0, 0); }
        }

        .main-platform {
            background: rgba(255, 0, 0, 0.15);
            border: 1px solid #ff0000;
            animation: pulse 2s infinite;
        }

        .share-btn {
            background: rgba(0, 191, 255, 0.1);
            border: 1px dashed #00bfff;
            margin-top: 30px;
            font-size: 16px;
        }

        .footer-text {
            margin-top: 25px; font-size: 12px; color: #666;
        }

        .youtube i { color: #ff0000; }
        .tiktok i { color: #fff; }
        .instagram i { color: #e1306c; }
        .discord i { color: #5865f2; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-blue-lightning-strikes-in-the-sky-31414-large.mp4" type="video/mp4">
    </video>

    <div class="cursor-glow" id="glow"></div>

    <div class="container">
        <img src="https://www.github.com/geversi.png" alt="GEVERSI" class="profile-img">
        <h1>GEVERSI</h1>
        <div class="subtitle">OFFICIAL HUB</div>
        
        <a href="https://www.youtube.com/@geversi" class="link-btn youtube main-platform" target="_blank">
            <i class="fab fa-youtube"></i> הירשמו לערוץ היוטיוב
        </a>
        <a href="https://www.tiktok.com/@geversi1" class="link-btn tiktok" target="_blank">
            <i class="fab fa-tiktok"></i> טיקטוק (תוכן יומי)
        </a>
        <a href="https://www.instagram.com/geversieitan/" class="link-btn instagram" target="_blank">
            <i class="fab fa-instagram"></i> אינסטגרם
        </a>
        <a href="https://discord.gg/eAurrnstKm" class="link-btn discord" target="_blank">
            <i class="fab fa-discord"></i> השרת הרשמי בדיסקורד
        </a>

        <div class="link-btn share-btn" onclick="shareSite()">
            <i class="fas fa-share-alt"></i> שתפו את הדף עם חברים
        </div>

        <div class="footer-text">© 2026 GEVERSI - כל הזכויות שמורות</div>
    </div>

    <script>
        // אפקט עכבר
        const glow = document.getElementById('glow');
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            glow.style.setProperty('--x', x + '%');
            glow.style.setProperty('--y', y + '%');
        });

        // פונקציית שיתוף
        function shareSite() {
            if (navigator.share) {
                navigator.share({
                    title: 'GEVERSI - הקישורים הרשמיים',
                    url: window.location.href
                });
            } else {
                alert("הקישור הועתק! שלחו אותו לחברים: " + window.location.href);
                navigator.clipboard.writeText(window.location.href);
            }
        }
    </script>
</body>
</html>
