<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEVERSI | קישורים רשמיים</title>
    <link rel="icon" type="image/png" href="https://www.github.com/geversi.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0;
            background-color: #000; color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; overflow: hidden;
        }

        /* קנבס לברקים */
        canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        .container {
            width: 90%; max-width: 380px; text-align: center;
            background: rgba(0, 5, 20, 0.8);
            padding: 40px 20px; border-radius: 25px;
            border: 2px solid #00bfff;
            box-shadow: 0 0 40px rgba(0, 191, 255, 0.4);
            backdrop-filter: blur(15px);
            z-index: 10; position: relative;
        }

        .profile-img {
            width: 110px; height: 110px; border-radius: 50%;
            border: 3px solid #00bfff; margin-bottom: 20px;
            box-shadow: 0 0 20px #00bfff;
        }

        .electric-text {
            font-size: 50px; font-weight: 900;
            color: #fff; letter-spacing: 5px;
            text-shadow: 0 0 15px #00bfff, 0 0 30px #00bfff;
            animation: shake 0.15s infinite alternate;
            font-family: 'Arial Black', sans-serif;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            100% { transform: translate(-1px, -1px); }
        }

        .subtitle {
            color: #00bfff; font-weight: bold; 
            letter-spacing: 2px; margin-top: 10px; margin-bottom: 25px;
        }

        .link-btn {
            display: flex; align-items: center; justify-content: center;
            gap: 15px; padding: 18px; margin: 15px 0;
            color: white; text-decoration: none;
            border-radius: 15px; font-weight: bold; font-size: 20px;
            background: rgba(0, 191, 255, 0.1);
            border: 1px solid #00bfff;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .link-btn:hover {
            background: #00bfff; color: #000;
            box-shadow: 0 0 35px #00bfff;
            transform: scale(1.05);
        }

        .youtube i { color: #ff0000; }
        .tiktok i { color: #fff; }
        .instagram i { color: #e1306c; }
        .discord i { color: #5865f2; }

        .link-btn:hover i { color: #000; }

        .footer-text { margin-top: 25px; font-size: 12px; color: #555; }
    </style>
</head>
<body>

    <canvas id="lightning"></canvas>

    <div class="container">
        <img src="https://www.github.com/geversi.png" alt="GEVERSI" class="profile-img">
        <div class="electric-text">GEVERSI</div>
        <div class="subtitle">הקישורים הרשמיים</div>
        
        <a href="https://www.youtube.com/@geversi" class="link-btn" target="_blank">
            <i class="fab fa-youtube"></i> ערוץ היוטיוב
        </a>
        <a href="https://www.tiktok.com/@geversi1" class="link-btn" target="_blank">
            <i class="fab fa-tiktok"></i> טיקטוק
        </a>
        <a href="https://www.instagram.com/geversieitan/" class="link-btn" target="_blank">
            <i class="fab fa-instagram"></i> אינסטגרם
        </a>
        <a href="https://discord.gg/eAurrnstKm" class="link-btn" target="_blank">
            <i class="fab fa-discord"></i> שרת הדיסקורד
        </a>

        <div class="footer-text">© 2026 GEVERSI | כל הזכויות שמורות</div>
    </div>

    <script>
        const canvas = document.getElementById('lightning');
        const ctx = canvas.getContext('2d');
        let w, h;

        function resize() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function createLightning() {
            // צבע כחול חשמלי חזק
            ctx.strokeStyle = '#00f2ff';
            ctx.lineWidth = Math.random() * 3 + 1;
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00bfff';

            let x = Math.random() * w;
            let y = 0;

            ctx.beginPath();
            ctx.moveTo(x, y);

            while (y < h) {
                x += (Math.random() - 0.5) * 60;
                y += Math.random() * 40;
                ctx.lineTo(x, y);
            }
            ctx.stroke();

            // מנקה את הברק מהר כדי שזה יראה כמו הבזק
            setTimeout(() => {
                ctx.clearRect(0, 0, w, h);
            }, 80);
        }

        function loop() {
            // סיכוי של 7% שיווצר ברק בכל פריים
            if (Math.random() < 0.07) {
                createLightning();
            }
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
