<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEVERSI | OFFICIAL LINKS</title>
    <link rel="icon" type="image/png" href="https://www.github.com/geversi.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000; color: white;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; overflow-x: hidden;
        }

        #bg-video {
            position: fixed; right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -2; object-fit: cover;
            filter: brightness(0.3) contrast(1.3);
        }

        .cursor-glow {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(0, 150, 255, 0.2) 0%, transparent 20%);
            pointer-events: none; z-index: -1;
        }

        .container {
            width: 90%; max-width: 400px; text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px 25px; border-radius: 30px;
            border: 1px solid rgba(0, 191, 255, 0.3);
            box-shadow: 0 0 50px rgba(0, 0, 0, 1);
            backdrop-filter: blur(20px); z-index: 2;
        }

        .profile-img {
            width: 120px; height: 120px; border-radius: 50%;
            border: 3px solid #00bfff; margin-bottom: 15px;
            box-shadow: 0 0 20px #00bfff; transition: 0.5s;
            object-fit: cover;
        }

        /* אפקט גליץ' לשם */
        .glitch {
            font-size: 42px; font-weight: 900;
            text-transform: uppercase; position: relative;
            letter-spacing: 5px; text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00;
            animation: glitch 725ms infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00; }
            15% { text-shadow: 0.05em 0 0 #00fffc, -0.03em -0.04em 0 #fc00ff, 0.025em 0.04em 0 #fffc00; }
            16% { text-shadow: -0.05em -0.025em 0 #00fffc, 0.025em 0.035em 0 #fc00ff, -0.05em -0.05em 0 #fffc00; }
            49% { text-shadow: -0.05em -0.025em 0 #00fffc, 0.025em 0.035em 0 #fc00ff, -0.05em -0.05em 0 #fffc00; }
            50% { text-shadow: 0.05em 0.035em 0 #00fffc, 0.03em 0 0 #fc00ff, 0 -0.04em 0 #fffc00; }
            99% { text-shadow: 0.05em 0.035em 0 #00fffc, 0.03em 0 0 #fc00ff, 0 -0.04em 0 #fffc00; }
            100% { text-shadow: -0.05em 0 0 #00fffc, -0.025em -0.04em 0 #fc00ff, -0.04em -0.025em 0 #fffc00; }
        }

        .subtitle {
            color: #00bfff; font-size: 14px;
            margin-bottom: 30px; letter-spacing: 2px;
            font-weight: bold; text-shadow: 0 0 5px #00bfff;
        }

        /* כפתורי ניאון */
        .link-btn {
            display: flex; align-items: center; justify-content: center;
            gap: 12px; padding: 18px; margin: 15px 0;
            color: white; text-decoration: none;
            border-radius: 15px; font-weight: bold; font-size: 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 191, 255, 0.2);
            transition: all 0.3s ease;
            position: relative; overflow: hidden;
        }

        .link-btn:hover {
            transform: scale(1.02);
            background: rgba(0, 191, 255, 0.15);
            border-color: #00bfff;
            box-shadow: 0 0 20px rgba(0, 191, 255, 0.6);
            text-shadow: 0 0 8px #fff;
        }

        .youtube i { color: #ff0000; }
        .tiktok i { color: #fff; }
        .instagram i { color: #e1306c; }
        .discord i { color: #5865f2; }

        .footer-text { margin-top: 25px; font-size: 11px; color: #444; letter-spacing: 1px; }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline id="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-blue-lightning-strikes-in-the-sky-31414-large.mp4" type="video/mp4">
    </video>

    <div class="cursor-glow" id="glow"></div>

    <div class="container">
        <img src="https://www.github.com/geversi.png" alt="GEVERSI" class="profile-img">
        <div class="glitch">GEVERSI</div>
        <div class="subtitle">OFFICIAL LINKS</div>
        
        <a href="https://www.youtube.com/@geversi" class="link-btn" target="_blank">
            <i class="fab fa-youtube"></i> ערוץ היוטיוב
        </a>
        <a href="https://www.tiktok.com/@geversi1" class="link-btn" target="_blank">
            <i class="fab fa-tiktok"></i> טיקטוק
        </a>
        <a href="https://www.instagram.com/geversieitan/" class="link-btn" target="_blank">
            <i class="fab fa-instagram"></i> אינסטגרם
        </a>
        <a href="https://discord.gg/eAurrnstKm" class="link-btn" target="_blank">
            <i class="fab fa-discord"></i> שרת הדיסקורד
        </a>

        <div class="footer-text">EST. 2026 | GEVERSI DIGITAL</div>
    </div>

    <script>
        const glow = document.getElementById('glow');
        window.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            glow.style.setProperty('--x', x + '%');
            glow.style.setProperty('--y', y + '%');
        });
    </script>
</body>
</html>
